<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Popover</h1>
    
    <div style="width: 250px; margin: 2em;">
      <h-popover>
        <h-popover-trigger as-child>
          <h-button variant="outline">
            Open popover
          </h-button>
        </h-popover-trigger>
        <h-popover-content>
          Some popover content
        </h-popover-content>
      </h-popover>
    </div>

  </div>

  <br /><br /><textarea readonly rows="10" style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <h-popover>
      <h-popover-trigger as-child>
        <h-button variant="outline">
          Open popover
        </h-button>
      </h-popover-trigger>
      <h-popover-content>
        Some popover content
      </h-popover-content>
    </h-popover>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
