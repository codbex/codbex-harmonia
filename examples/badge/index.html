<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body>

  <div id="app" class="container">
    <h1>Badge</h1>

    <h-badge>Badge</h-badge>
    <h-badge variant="secondary">Secondary</h-badge>
    <h-badge variant="outline">Outline</h-badge>
    <h-badge variant="destructive">Destructive</h-badge>

  </div>


  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
