<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Skeleton</h1>

    <div class="flex items-center space-x-4">
      <h-skeleton class="h-12 w-12 rounded-full"></h-skeleton>
      <div class="space-y-2">
        <h-skeleton class="h-4 w-[250px]"></h-skeleton>
        <h-skeleton class="h-4 w-[200px]"></h-skeleton>
      </div>
    </div>

  </div>

  <br /><br /><textarea readonly rows="7"
    style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <div class="flex items-center space-x-4">
      <h-skeleton class="h-12 w-12 rounded-full"></h-skeleton>
      <div class="space-y-2">
        <h-skeleton class="h-4 w-[250px]"></h-skeleton>
        <h-skeleton class="h-4 w-[200px]"></h-skeleton>
      </div>
    </div>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
