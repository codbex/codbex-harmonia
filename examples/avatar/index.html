<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body>

  <div id="app" class="container">
    <h1>Avatar</h1>

    <h-avatar>
      <h-avatar-image src="https://www.codbex.com/logo.svg" alt="codbex" ></h-avatar-image>
      <h-avatar-fallback>codbex</h-avatar-fallback>
    </h-avatar>

  </div>


  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
