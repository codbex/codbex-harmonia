<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Sheet</h1>

    <div style="width: 450px; margin: 2em;">
      <h-sheet>
        <h-sheet-trigger as-child>
          <h-button variant="outline">
            Open
          </h-button>
        </h-sheet-trigger>
        <h-sheet-content>
          <h-sheet-header>
            <h-sheet-title>Are you absolutely sure?</h-sheet-title>
            <h-sheet-description>
              This action cannot be undone. This will permanently delete your account
              and remove your data from our servers.
            </h-sheet-description>
          </h-sheet-header>
        </h-sheet-content>
      </h-sheet>
    </div>

  </div>

  <br /><br /><textarea readonly rows="16"
    style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <h-sheet>
      <h-sheet-trigger as-child>
        <h-button variant="outline">
          Open
        </h-button>
      </h-sheet-trigger>
      <h-sheet-content>
        <h-sheet-header>
          <h-sheet-title>Are you absolutely sure?</h-sheet-title>
          <h-sheet-description>
            This action cannot be undone. This will permanently delete your account
            and remove your data from our servers.
          </h-sheet-description>
        </h-sheet-header>
      </h-sheet-content>
    </h-sheet>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
