<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Menubar</h1>
    
    <div style="width: 250px; margin: 2em;">
      <h-menubar>
        <h-menubar-menu>
          <h-menubar-trigger>File</h-menubar-trigger>
          <h-menubar-content>
            <h-menubar-item>
              New Tab <h-menubar-shortcut>⌘T</h-menubar-shortcut>
            </h-menubar-item>
            <h-menubar-item>New Window</h-menubar-item>
            <h-menubar-separator></h-menubar-separator>
            <h-menubar-item>Share</h-menubar-item>
            <h-menubar-separator></h-menubar-separator>
            <h-menubar-item>Print</h-menubar-item>
          </h-menubar-content>
        </h-menubar-menu>
      </h-menubar>
    </div>

  </div>

  <br /><br /><textarea readonly rows="15" style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <h-menubar>
      <h-menubar-menu>
        <h-menubar-trigger>File</h-menubar-trigger>
        <h-menubar-content>
          <h-menubar-item>
            New Tab <h-menubar-shortcut>⌘T</h-menubar-shortcut>
          </h-menubar-item>
          <h-menubar-item>New Window</h-menubar-item>
          <h-menubar-separator></h-menubar-separator>
          <h-menubar-item>Share</h-menubar-item>
          <h-menubar-separator></h-menubar-separator>
          <h-menubar-item>Print</h-menubar-item>
        </h-menubar-content>
      </h-menubar-menu>
    </h-menubar>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
