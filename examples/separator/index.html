<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Separator</h1>

    <div style="width: 450px; margin: 2em;">
      <div class="space-y-1">
        <h4 class="text-sm font-medium leading-none">
          Radix Primitives
        </h4>
        <p class="text-sm text-muted-foreground">
          An open-source UI component library.
        </p>
      </div>
      <h-separator class="my-4" label="Or"></h-separator>
      <div class="flex h-5 items-center space-x-4 text-sm">
        <div>Blog</div>
        <h-separator orientation="vertical"></h-separator>
        <div>Docs</div>
        <h-separator orientation="vertical"></h-separator>
        <div>Source</div>
      </div>
    </div>

  </div>

  <br /><br /><textarea readonly rows="1"
    style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <h-separator class="my-4" label="Or"></h-separator>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
