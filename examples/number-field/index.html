<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Number Field</h1>

    <div style="width: 250px; margin: 2em;">
      <h-number-field id="age" :default-value="18" :min="0">
        <h-label for="age">Age</h-label>
        <h-number-field-content>
          <h-number-field-decrement></h-number-field-decrement>
          <h-number-field-input></h-number-field-input>
          <h-number-field-increment></h-number-field-increment>
        </h-number-field-content>
      </h-number-field>
    </div>

  </div>

  <br /><br /><textarea readonly rows="8"
    style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <h-number-field id="age" :default-value="18" :min="0">
      <h-label for="age">Age</h-label>
      <h-number-field-content>
        <h-number-field-decrement></h-number-field-decrement>
        <h-number-field-input></h-number-field-input>
        <h-number-field-increment></h-number-field-increment>
      </h-number-field-content>
    </h-number-field>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
