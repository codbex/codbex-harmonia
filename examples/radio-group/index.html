<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>codbex-harmonia Example</title>
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>

    <body style="margin: 2em">
        <div id="app" class="container">
            <h1>Radio Group</h1>

            <div style="width: 250px; margin: 2em">
                <h-radio-group default-value="comfortable">
                    <div class="flex items-center space-x-2">
                        <h-radio-group-item id="r1" value="default"></h-radio-group-item>
                        <h-label for="r1">Default</h-label>
                    </div>
                    <div class="flex items-center space-x-2">
                        <h-radio-group-item id="r2" value="comfortable"></h-radio-group-item>
                        <h-label for="r2">Comfortable</h-label>
                    </div>
                    <div class="flex items-center space-x-2">
                        <h-radio-group-item id="r3" value="compact"></h-radio-group-item>
                        <h-label for="r3">Compact</h-label>
                    </div>
                </h-radio-group>
            </div>
        </div>

        <br /><br /><textarea
            readonly
            rows="14"
            style="background: #fafafa; border: none; resize: none; outline: none; width: 100%"
        >
    <h-radio-group default-value="comfortable">
      <div class="flex items-center space-x-2">
        <h-radio-group-item id="r1" value="default"></h-radio-group-item>
        <h-label for="r1">Default</h-label>
      </div>
      <div class="flex items-center space-x-2">
        <h-radio-group-item id="r2" value="comfortable"></h-radio-group-item>
        <h-label for="r2">Comfortable</h-label>
      </div>
      <div class="flex items-center space-x-2">
        <h-radio-group-item id="r3" value="compact"></h-radio-group-item>
        <h-label for="r3">Compact</h-label>
      </div>
    </h-radio-group>
  </textarea
        >

        <br /><br /><button onclick="history.back()">&lt; Go Back</button>

        <!-- Import JavaScript file as ES6 module -->
        <script type="module" src="app.js"></script>
    </body>
</html>
