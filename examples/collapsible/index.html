<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>codbex-harmonia Example</title>
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>

    <body style="margin: 2em">
        <div id="app" class="container">
            <h1>Collapsible</h1>

            <div class="flex items-center space-x-2">
                <h-collapsible v-model:open="isOpen" class="w-[350px] space-y-2">
                    <div class="flex items-center justify-between space-x-4 px-4">
                        <h4 class="text-sm font-semibold">@peduarte starred 3 repositories</h4>
                        <h-collapsible-trigger as-child>
                            <h-button variant="ghost" size="sm" class="w-9 p-0">
                                <i-chevrons-up-down class="h-4 w-4"></i-chevrons-up-down>
                                <span class="sr-only">Toggle</span>
                            </h-button>
                        </h-collapsible-trigger>
                    </div>
                    <div class="rounded-md border px-4 py-3 font-mono text-sm">@radix-ui/primitives</div>
                    <h-collapsible-content class="space-y-2">
                        <div class="rounded-md border px-4 py-3 font-mono text-sm">@radix-ui/colors</div>
                        <div class="rounded-md border px-4 py-3 font-mono text-sm">@stitches/react</div>
                    </h-collapsible-content>
                </h-collapsible>
            </div>
        </div>

        <br /><br /><textarea
            readonly
            rows="24"
            style="background: #fafafa; border: none; resize: none; outline: none; width: 100%"
        >
    <h-collapsible v-model:open="isOpen" class="w-[350px] space-y-2">
      <div class="flex items-center justify-between space-x-4 px-4">
        <h4 class="text-sm font-semibold">
          @peduarte starred 3 repositories
        </h4>
        <h-collapsible-trigger as-child>
          <h-button variant="ghost" size="sm" class="w-9 p-0">
            <i-chevrons-up-down class="h-4 w-4"></i-chevrons-up-down>
            <span class="sr-only">Toggle</span>
          </h-button>
        </h-collapsible-trigger>
      </div>
      <div class="rounded-md border px-4 py-3 font-mono text-sm">
        @radix-ui/primitives
      </div>
      <h-collapsible-content class="space-y-2">
        <div class="rounded-md border px-4 py-3 font-mono text-sm">
          @radix-ui/colors
        </div>
        <div class="rounded-md border px-4 py-3 font-mono text-sm">
          @stitches/react
        </div>
      </h-collapsible-content>
    </h-collapsible>
  </textarea
        >

        <br /><br /><button onclick="history.back()">&lt; Go Back</button>

        <!-- Import JavaScript file as ES6 module -->
        <script type="module" src="app.js"></script>
    </body>
</html>
