<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codbex-harmonia Example</title>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="/dist/codbex-harmonia.umd.js"></script>
  <link rel="stylesheet" href="/dist/style.css" />
</head>

<body style="margin: 2em;">

  <div id="app" class="container">
    <h1>Toggle Group</h1>
    
    <h-toggle-group type="multiple">
      <h-toggle-group-item value="bold" aria-label="Toggle bold">
        <i-bold class="h-4 w-4"></i-bold>
      </h-toggle-group-item>
      <h-toggle-group-item value="italic" aria-label="Toggle italic">
        <i-italic class="h-4 w-4"></i-italic>
      </h-toggle-group-item>
      <h-toggle-group-item value="underline" aria-label="Toggle underline">
        <i-underline class="h-4 w-4"></i-underline>
      </h-toggle-group-item>
    </h-toggle-group>

  </div>

  <br /><br /><textarea readonly rows="11" style="background:#fafafa; border:none; resize:none; outline:none; width:100%;">
    <h-toggle-group type="multiple">
      <h-toggle-group-item value="bold" aria-label="Toggle bold">
        <i-bold class="h-4 w-4"></i-bold>
      </h-toggle-group-item>
      <h-toggle-group-item value="italic" aria-label="Toggle italic">
        <i-italic class="h-4 w-4"></i-italic>
      </h-toggle-group-item>
      <h-toggle-group-item value="underline" aria-label="Toggle underline">
        <i-underline class="h-4 w-4"></i-underline>
      </h-toggle-group-item>
    </h-toggle-group>
  </textarea>

  <br /><br /><button onclick="history.back()">&lt; Go Back</button>

  <!-- Import JavaScript file as ES6 module -->
  <script type="module" src="app.js"></script>

</body>

</html>
