<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>codbex-harmonia Example</title>
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>

    <body style="margin: 2em">
        <div id="app" class="container">
            <h1>Stepper</h1>

            <h-stepper>
                <h-stepper-item v-for="item in steps" :key="item.step" class="basis-1/4" :step="item.step">
                    <h-stepper-trigger>
                        <h-stepper-indicator>
                            <component :is="item.icon" class="w-4 h-4" />
                        </h-stepper-indicator>
                        <div class="flex flex-col">
                            <h-stepper-title> {{ item.title }} </h-stepper-title>
                            <h-stepper-description> {{ item.description }} </h-stepper-description>
                        </div>
                    </h-stepper-trigger>
                    <h-stepper-separator
                        v-if="item.step !== steps[steps.length - 1].step"
                        class="w-full h-px"
                    ></h-stepper-separator>
                </h-stepper-item>
            </h-stepper>
        </div>

        <br /><br /><textarea
            readonly
            rows="26"
            style="background: #fafafa; border: none; resize: none; outline: none; width: 100%"
        >
    <h-stepper>
      <h-stepper-item
        v-for="item in steps"
        :key="item.step"
        class="basis-1/4"
        :step="item.step"
      >
        <h-stepper-trigger>
          <h-stepper-indicator>
            <component :is="item.icon" class="w-4 h-4" />
          </h-stepper-indicator>
          <div class="flex flex-col">
            <h-stepper-title>
              {{ item.title }}
            </h-stepper-title>
            <h-stepper-description>
              {{ item.description }}
            </h-stepper-description>
          </div>
        </h-stepper-trigger>
        <h-stepper-separator
          v-if="item.step !== steps[steps.length - 1].step"
          class="w-full h-px"
        ></h-stepper-separator>
      </h-stepper-item>
    </h-stepper>
  </textarea
        >

        <br /><br /><button onclick="history.back()">&lt; Go Back</button>

        <!-- Import JavaScript file as ES6 module -->
        <script type="module" src="app.js"></script>
    </body>
</html>
