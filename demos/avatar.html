<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Harmonia</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>
    <body>
        <div id="app" class="flex flex-col h-full overflow-auto items-start gap-2 p-4">
            <h-avatar>
                <h-avatar-image src="https://www.codbex.com/logo.svg" alt="@radix-vue" />
                <h-avatar-fallback>CB</h-avatar-fallback>
            </h-avatar>

            <div class="font-semibold text-sm border-b-2 w-full px-2 pb-1.5 pt-4 first:pt-0">Text Only</div>

            <h-avatar>
                <h-avatar-fallback>CB</h-avatar-fallback>
            </h-avatar>
        </div>
        <script type="module">
            const app = Vue.createApp({})
            app.use(Harmonia)
            app.mount('#app')
        </script>
    </body>
</html>
