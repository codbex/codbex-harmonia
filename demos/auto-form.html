<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Harmonia</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"

        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>
    <body>
        <div id="app" class="flex flex-col h-full overflow-auto items-start gap-2 p-4">
            <h-auto-form v-if="schema" class="w-2/3 space-y-6" :schema="schema" @submit="onSubmit">
                <h-button type="submit">Submit</h-button>
            </h-auto-form>

            <div v-else>Loading...</div>

            <h-auto-form class="w-2/3 space-y-6" :schema="schema2" @submit="onSubmit2">
                <h-button type="submit">Submit</h-button>
            </h-auto-form>

                    },

            <h-auto-form class="w-2/3 space-y-6" :schema="schema4" @submit="onSubmit4">
                <h-button type="submit"> Submit </h-button>
            </h-auto-form>

            <h-auto-form class="w-2/3 space-y-6" :schema="schema5" :form="form" @submit="onSubmit5">
                <h-button type="submit"> Submit </h-button>
            </h-auto-form>

            <h-auto-form
                class="w-2/3 space-y-6"
                :schema="schema6"
                :field-config="{
                    age: {
                        description:
                        'Setting this below 18 will require parents consent.',
                    },
                    parentsAllowed: {
                        label: 'Did your parents allow you to register?',
                    },
                    vegetarian: {
                        label: 'Are you a vegetarian?',
                        description:
                        'Setting this to true will remove non-vegetarian food options.',
                    },
                    mealOptions: {
                        component: 'radio',
                    },
                }"
                :dependencies="dependencies"
                @submit="onSubmit6"
            >
                <h-button type="submit"> Submit </h-button>
            </h-auto-form>

            <h-auto-form
                class="w-2/3 space-y-6"
                :schema="schema7"
                :field-config="{
                subObject: {
                    numberField: {
                    inputProps: {
                        type: 'number',
                    },
                    },
                },
                }"
                @submit="onSubmit7"
            >
                <h-button type="submit"> Submit </h-button>
            </h-auto-form>
        </div>
        <script type="module">
            import * as z from 'zod'
            import { useForm } from 'vee-validate'
            import { toTypedSchema } from '@vee-validate/zod'
            let schema5 = z.object({
                username: z.string(),
            })
            const app = Vue.createApp({
                data() {
                    return {
                        schema: Vue.shallowRef(null),
                        schema2: z.object({
                            guestListName: z.string(),
                            invitedGuests: z
                                .array(
                                    z.object({
                                        name: z.string(),
                                        age: z.coerce.number(),
                                    }),
                                )
                                .describe('Guests invited to the party'),
                        }),
                        schema3: z.object({
                            username: z
                                .string({
                                    required_error: 'Username is required.',
                                })
                                .min(2, {
                                    message: 'Username must be at least 2 characters.',
                                }),

                            password: z
                                .string({
                                    required_error: 'Password is required.',
                                })
                                .min(8, {
                                    message: 'Password must be at least 8 characters.',
                                }),

                            favouriteNumber: z.coerce
                                .number({
                                    invalid_type_error: 'Favourite number must be a number.',
                                })
                                .min(1, {
                                    message: 'Favourite number must be at least 1.',
                                })
                                .max(10, {
                                    message: 'Favourite number must be at most 10.',
                                })
                                .default(1)
                                .optional(),

                            acceptTerms: z.boolean().refine((value) => value, {
                                message: 'You must accept the terms and conditions.',
                                path: ['acceptTerms'],
                            }),

                            sendMeMails: z.boolean().optional(),

                            birthday: z.coerce.date().optional(),

                            color: z.enum(['red', 'green', 'blue']).optional(),

                            // Another enum example
                            marshmallows: z.enum(['not many', 'a few', 'a lot', 'too many']),

                            bio: z
                                .string()
                                .min(10, {
                                    message: 'Bio must be at least 10 characters.',
                                })
                                .max(160, {
                                    message: 'Bio must not be longer than 30 characters.',
                                })
                                .optional(),

                            customParent: z.string().optional(),

                            file: z.string().optional(),
                        }),
                        schema4: z
                            .object({
                                password: z.string(),
                                confirm: z.string(),
                            })
                            .refine((data) => data.password === data.confirm, {
                                message: 'Passwords must match.',
                                path: ['confirm'],
                            }),
                        schema5: schema5,
                        form: useForm({
                            validationSchema: toTypedSchema(schema5),
                        }),
                        schema6: z.object({
                            age: z.number(),
                            parentsAllowed: z.boolean().optional(),
                            vegetarian: z.boolean().optional(),
                            mealOptions: z.enum(['Pasta', 'Salad', 'Beef Wellington']).optional(),
                        }),
                        dependencies: [
                            {
                                sourceField: 'age',
                                type: Harmonia.autoForm.DependencyType.HIDES,
                                targetField: 'parentsAllowed',
                                when: (age) => age >= 18,
                            },
                            {
                                sourceField: 'age',
                                type: Harmonia.autoForm.DependencyType.REQUIRES,
                                targetField: 'parentsAllowed',
                                when: (age) => age < 18,
                            },
                            {
                                sourceField: 'vegetarian',
                                type: Harmonia.autoForm.DependencyType.SETS_OPTIONS,
                                targetField: 'mealOptions',
                                when: (vegetarian) => vegetarian,
                                options: ['Pasta', 'Salad'],
                            },
                        ],
                        schema7: z.object({
                            subObject: z.object({
                                subField: z.string().optional().default('Sub Field'),
                                numberField: z.number().optional().default(1),

                                subSubObject: z
                                    .object({
                                        subSubField: z.string().default('Sub Sub Field'),
                                    })
                                    .describe('Sub Sub Object Description'),
                            }),
                            optionalSubObject: z
                                .object({
                                    optionalSubField: z.string(),
                                    otherOptionalSubField: z.string(),
                                })
                                .optional(),
                        }),
                    }
                },
                methods: {
                    onSubmit(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                    onSubmit2(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                    onSubmit3(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                    onSubmit4(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                    onSubmit5(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                    onSubmit6(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                    onSubmit7(values) {
                        Harmonia.toast({
                            title: 'You submitted the following values:',
                            description: Vue.h(
                                'pre',
                                { class: 'mt-2 w-[340px] rounded-md bg-slate-950 p-4' },
                                Vue.h('code', { class: 'text-white' }, JSON.stringify(values, null, 2)),
                            ),
                        })
                    },
                },
                mounted() {
                    fetch('https://jsonplaceholder.typicode.com/users')
                        .then((response) => response.json())
                        .then((data) => {
                            this.schema = z.object({
                                user: z.enum(data.map((user) => user.name)),
                            })
                        })
                },
            })
            app.use(Harmonia)
            app.mount('#app')
        </script>
    </body>
</html>
