<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Harmonia</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>
    <body>
        <div id="app" class="flex flex-col h-full overflow-auto items-start gap-2 p-4">
            <h-accordion type="single" class="w-full" collapsible :default-value="defaultValue">
                <h-accordion-item v-for="item in data.accordionItems" :key="item.value" :value="item.value">
                    <h-accordion-trigger>{{ item.title }}</h-accordion-trigger>
                    <h-accordion-content>{{ item.content }}</h-accordion-content>
                </h-accordion-item>
            </h-accordion>
        </div>
        <script type="module">
            const app = Vue.createApp({
                data() {
                    return {
                        data: {
                            accordionItems: [
                                {
                                    value: 'item-1',
                                    title: 'Is it accessible?',
                                    content: 'Yes. It adheres to the WAI-ARIA design pattern.',
                                },
                                {
                                    value: 'item-2',
                                    title: 'Is it unstyled?',
                                    content:
                                        "Yes. It's unstyled by default, giving you freedom over the look and feel.",
                                },
                                {
                                    value: 'item-3',
                                    title: 'Can it be animated?',
                                    content: 'Yes! You can use the transition prop to configure the animation.',
                                },
                            ],
                        },
                    }
                },
            })
            app.use(Harmonia)
            app.mount('#app')
        </script>
    </body>
</html>
