<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Harmonia</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>
    <body>
        <div id="app" class="flex flex-col h-full overflow-auto items-start gap-2 p-4">
            <h-context-menu>
                <h-context-menu-trigger
                    class="flex h-[150px] w-[300px] items-center justify-center rounded-md border border-dashed text-sm"
                >
                    Right click here
                </h-context-menu-trigger>
                <h-context-menu-content class="w-64">
                    <h-context-menu-item inset>
                        Back
                        <h-context-menu-shortcut>⌘[</h-context-menu-shortcut>
                    </h-context-menu-item>
                    <h-context-menu-item inset disabled>
                        Forward
                        <h-context-menu-shortcut>⌘]</h-context-menu-shortcut>
                    </h-context-menu-item>
                    <h-context-menu-item inset>
                        Reload
                        <h-context-menu-shortcut>⌘R</h-context-menu-shortcut>
                    </h-context-menu-item>
                    <h-context-menu-sub>
                        <h-context-menu-sub-trigger inset> More Tools </h-context-menu-sub-trigger>
                        <h-context-menu-sub-content class="w-48">
                            <h-context-menu-item>
                                Save Page As...
                                <h-context-menu-shortcut>⇧⌘S</h-context-menu-shortcut>
                            </h-context-menu-item>
                            <h-context-menu-item>Create Shortcut...</h-context-menu-item>
                            <h-context-menu-item>Name Window...</h-context-menu-item>
                            <h-context-menu-separator></h-context-menu-separator>
                            <h-context-menu-item>Developer Tools</h-context-menu-item>
                        </h-context-menu-sub-content>
                    </h-context-menu-sub>
                    <h-context-menu-separator></h-context-menu-separator>
                    <h-context-menu-checkbox-item checked>
                        Show Bookmarks Bar
                        <h-context-menu-shortcut>⌘⇧B</h-context-menu-shortcut>
                    </h-context-menu-checkbox-item>
                    <h-context-menu-checkbox-item>Show Full URLs</h-context-menu-checkbox-item>
                    <h-context-menu-separator></h-context-menu-separator>
                    <h-context-menu-radio-group model-value="pedro">
                        <h-context-menu-label inset> People </h-context-menu-label>
                        <h-context-menu-separator></h-context-menu-separator>
                        <h-context-menu-radio-item value="pedro"> Pedro Duarte </h-context-menu-radio-item>
                        <h-context-menu-radio-item value="colm"> Colm Tuite </h-context-menu-radio-item>
                    </h-context-menu-radio-group>
                </h-context-menu-content>
            </h-context-menu>
        </div>
        <script type="module">
            const app = Vue.createApp({})
            app.use(Harmonia)
            app.mount('#app')
        </script>
    </body>
</html>
