<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Harmonia</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="/node_modules/vue/dist/vue.global.prod.js"></script>
        <script src="/dist/harmonia.umd.js"></script>
        <link rel="stylesheet" href="/dist/harmonia.css" />
    </head>
    <body>
        <div id="app" class="flex flex-col h-full overflow-auto items-start gap-2 p-4">
            <div class="w-full">
                <div class="flex gap-2 items-center py-4">
                    <h-input
                        class="max-w-sm"
                        placeholder="Filter emails..."
                        :model-value="table.getColumn('email')?.getFilterValue()"
                        @update:model-value="table.getColumn('email')?.setFilterValue($event)"
                    ></h-input>
                    <h-dropdown-menu>
                        <h-dropdown-menu-trigger as-child>
                            <h-button variant="outline" class="ml-auto">
                                Columns <i-chevron-down class="ml-2 h-4 w-4"></i-chevron-down>
                            </h-button>
                        </h-dropdown-menu-trigger>
                        <h-dropdown-menu-content align="end">
                            <h-dropdown-menu-checkbox-item
                                v-for="column in table.getAllColumns().filter((column) => column.getCanHide())"
                                :key="column.id"
                                class="capitalize"
                                :checked="column.getIsVisible()"
                                @update:checked="(value) => {
                                    column.toggleVisibility(!!value)
                                }"
                            >
                                {{ column.id }}
                            </h-dropdown-menu-checkbox-item>
                        </h-dropdown-menu-content>
                    </h-dropdown-menu>
                </div>
                <div class="rounded-md border">
                    <h-table>
                        <h-table-header>
                            <h-table-row v-for="headerGroup in table.getHeaderGroups()" :key="headerGroup.id">
                                <h-table-head
                                    v-for="header in headerGroup.headers"
                                    :key="header.id"
                                    :data-pinned="header.column.getIsPinned()"
                                    :class="header.column.getIsPinned() ? 'sticky bg-background/95' : '' + header.column.getIsPinned() === 'left' ? 'left-0' : 'right-0'"
                                >
                                    <flex-render
                                        v-if="!header.isPlaceholder"
                                        :render="header.column.columnDef.header"
                                        :props="header.getContext()"
                                    ></flex-render>
                                </h-table-head>
                            </h-table-row>
                        </h-table-header>
                        <h-table-body>
                            <template v-if="table.getRowModel().rows?.length">
                                <template v-for="row in table.getRowModel().rows" :key="row.id">
                                    <h-table-row :data-state="row.getIsSelected() && 'selected'">
                                        <h-table-cell
                                            v-for="cell in row.getVisibleCells()"
                                            :key="cell.id"
                                            :data-pinned="cell.column.getIsPinned()"
                                            :class="cell.column.getIsPinned() ? 'sticky bg-background/95' : '' + cell.column.getIsPinned() === 'left' ? 'left-0' : 'right-0'"
                                        >
                                            <flex-render
                                                :render="cell.column.columnDef.cell"
                                                :props="cell.getContext()"
                                            ></flex-render>
                                        </h-table-cell>
                                    </h-table-row>
                                    <h-table-row v-if="row.getIsExpanded()">
                                        <h-table-cell :colspan="row.getAllCells().length">
                                            {{ row.original }}
                                        </h-table-cell>
                                    </h-table-row>
                                </template>
                            </template>

                            <h-table-row v-else>
                                <h-table-cell :colspan="getColSpan" class="h-24 text-center">
                                    No results.
                                </h-table-cell>
                            </h-table-row>
                        </h-table-body>
                    </h-table>
                </div>

                <div class="flex items-center justify-end space-x-2 py-4">
                    <div class="flex-1 text-sm text-muted-foreground">
                        {{ table.getFilteredSelectedRowModel().rows.length }} of {{
                        table.getFilteredRowModel().rows.length }} row(s) selected.
                    </div>
                    <div class="space-x-2">
                        <h-button
                            variant="outline"
                            size="sm"
                            :disabled="!table.getCanPreviousPage()"
                            @click="table.previousPage()"
                        >
                            Previous
                        </h-button>
                        <h-button
                            variant="outline"
                            size="sm"
                            :disabled="!table.getCanNextPage()"
                            @click="table.nextPage()"
                        >
                            Next
                        </h-button>
                    </div>
                </div>
            </div>
        </div>
        <script type="module">
            import * as z from 'zod'
            import { ArrowUpDown, ChevronDown } from 'lucide-vue-next'
            import {
                createColumnHelper,
                FlexRender,
                getCoreRowModel,
                getExpandedRowModel,
                getFilteredRowModel,
                getPaginationRowModel,
                getSortedRowModel,
                useVueTable,
            } from '@tanstack/vue-table'

            const data = [
                {
                    id: 'm5gr84i9',
                    amount: 316,
                    status: 'success',
                    email: 'ken99@yahoo.com',
                },
                {
                    id: '3u1reuv4',
                    amount: 242,
                    status: 'success',
                    email: 'Abe45@gmail.com',
                },
                {
                    id: 'derv1ws0',
                    amount: 837,
                    status: 'processing',
                    email: 'Monserrat44@gmail.com',
                },
                {
                    id: '5kma53ae',
                    amount: 874,
                    status: 'success',
                    email: 'Silas22@gmail.com',
                },
                {
                    id: 'bhqecj4p',
                    amount: 721,
                    status: 'failed',
                    email: 'carmella@hotmail.com',
                },
            ]

            const columnHelper = createColumnHelper()

            const columns = [
                columnHelper.display({
                    id: 'select',
                    header: ({ table }) =>
                        Vue.h(Checkbox, {
                            checked:
                                table.getIsAllPageRowsSelected() ||
                                (table.getIsSomePageRowsSelected() && 'indeterminate'),
                            'onUpdate:checked': (value) => table.toggleAllPageRowsSelected(!!value),
                            ariaLabel: 'Select all',
                        }),
                    cell: ({ row }) => {
                        return Vue.h(Checkbox, {
                            checked: row.getIsSelected(),
                            'onUpdate:checked': (value) => row.toggleSelected(!!value),
                            ariaLabel: 'Select row',
                        })
                    },
                    enableSorting: false,
                    enableHiding: false,
                }),
                columnHelper.accessor('status', {
                    enablePinning: true,
                    header: 'Status',
                    cell: ({ row }) => Vue.h('div', { class: 'capitalize' }, row.getValue('status')),
                }),
                columnHelper.accessor('email', {
                    header: ({ column }) => {
                        return Vue.h(
                            Button,
                            {
                                variant: 'ghost',
                                onClick: () => column.toggleSorting(column.getIsSorted() === 'asc'),
                            },
                            () => ['Email', Vue.h(ArrowUpDown, { class: 'ml-2 h-4 w-4' })],
                        )
                    },
                    cell: ({ row }) => Vue.h('div', { class: 'lowercase' }, row.getValue('email')),
                }),
                columnHelper.accessor('amount', {
                    header: () => Vue.h('div', { class: 'text-right' }, 'Amount'),
                    cell: ({ row }) => {
                        const amount = Number.parseFloat(row.getValue('amount'))

                        // Format the amount as a dollar amount
                        const formatted = new Intl.NumberFormat('en-US', {
                            style: 'currency',
                            currency: 'USD',
                        }).format(amount)

                        return Vue.h('div', { class: 'text-right font-medium' }, formatted)
                    },
                }),
                columnHelper.display({
                    id: 'actions',
                    enableHiding: false,
                    cell: ({ row }) => {
                        const payment = row.original

                        return Vue.h(
                            'div',
                            { class: 'relative' },
                            Vue.h(DropdownAction, {
                                payment,
                                onExpand: row.toggleExpanded,
                            }),
                        )
                    },
                }),
            ]

            const sorting = Vue.ref([])
            const columnFilters = Vue.ref([])
            const columnVisibility = Vue.ref({})
            const rowSelection = Vue.ref({})
            const expanded = Vue.ref({})

            const table = useVueTable({
                data,
                columns,
                getCoreRowModel: getCoreRowModel(),
                getPaginationRowModel: getPaginationRowModel(),
                getSortedRowModel: getSortedRowModel(),
                getFilteredRowModel: getFilteredRowModel(),
                getExpandedRowModel: getExpandedRowModel(),
                onSortingChange: (updaterOrValue) => Harmonia.valueUpdater(updaterOrValue, sorting),
                onColumnFiltersChange: (updaterOrValue) => Harmonia.valueUpdater(updaterOrValue, columnFilters),
                onColumnVisibilityChange: (updaterOrValue) => Harmonia.valueUpdater(updaterOrValue, columnVisibility),
                onRowSelectionChange: (updaterOrValue) => Harmonia.valueUpdater(updaterOrValue, rowSelection),
                onExpandedChange: (updaterOrValue) => Harmonia.valueUpdater(updaterOrValue, expanded),
                state: {
                    get sorting() {
                        return sorting.value
                    },
                    get columnFilters() {
                        return columnFilters.value
                    },
                    get columnVisibility() {
                        return columnVisibility.value
                    },
                    get rowSelection() {
                        return rowSelection.value
                    },
                    get expanded() {
                        return expanded.value
                    },
                    columnPinning: {
                        left: ['status'],
                    },
                },
            })

            const app = Vue.createApp({
                data() {
                    return {
                        table: table,
                    }
                },
                methods: {
                    getColSpan() {
                        return columns.length
                    },
                },
            })
            app.use(Harmonia)
            app.component('IChevronDown', ChevronDown)
            app.mount('#app')
        </script>
    </body>
</html>
